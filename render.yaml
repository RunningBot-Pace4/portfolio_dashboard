services:
  - type: web
    name: portfolio-dashboard
    runtime: docker
    plan: free
    envVars:
      - key: PRICE_CACHE_SECONDS
        value: "300"
      - key: DB_PATH
        value: "/var/data/portfolio.db"
    # For long-term hosted use, add a persistent disk in Render and mount it at /var/data.
